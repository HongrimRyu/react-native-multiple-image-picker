plugins {
    id 'com.android.library'
    id 'org.jetbrains.kotlin.android'
    id 'com.facebook.react' apply false
}

def reactNativeArchitectures() {
    def value = rootProject.getProperties().get("reactNativeArchitectures")
    return value ? value.split(",") : ["armeabi-v7a", "arm64-v8a", "x86", "x86_64"]
}

def isNewArchitectureEnabled() {
    return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

android {
    namespace "com.margelo.nitro.multipleimagepicker"

    compileSdk = (project.properties["MultipleImagePicker_compileSdkVersion"] ?: 36).toInteger()
    ndkVersion = project.properties["MultipleImagePicker_ndkVersion"] ?: "27.1.12297006"

    defaultConfig {
        minSdk = (project.properties["MultipleImagePicker_minSdkVersion"] ?: 23).toInteger()
        targetSdk = (project.properties["MultipleImagePicker_targetSdkVersion"] ?: 36).toInteger()
        buildConfigField "boolean", "IS_NEW_ARCHITECTURE_ENABLED", isNewArchitectureEnabled().toString()

        ndk {
            abiFilters += reactNativeArchitectures()
        }

        externalNativeBuild {
            cmake {
                cppFlags "-O2 -frtti -fexceptions -Wall -fstack-protector-all -fPIC -DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES"
                arguments "-DANDROID_STL=c++_shared",
                          "-DCMAKE_SHARED_LINKER_FLAGS=-Wl,-z,max-page-size=16384",
                          "-DCMAKE_EXE_LINKER_FLAGS=-Wl,-z,max-page-size=16384"
            }
        }
    }

    externalNativeBuild {
        cmake {
            path "CMakeLists.txt"
            version "3.22.1"
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlin {
        jvmToolchain(17)
    }

    buildTypes {
        release { minifyEnabled false }
        debug { minifyEnabled false; jniDebuggable true }
    }

    sourceSets {
        main {
            java.srcDirs += ["src/main/java"]
            jniLibs.srcDirs = ['src/main/jniLibs']
            if (isNewArchitectureEnabled()) {
                java.srcDirs += ["${buildDir}/generated/source/codegen/java"]
            }
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging = true
        }
        pickFirst 'lib/x86/libc++_shared.so'
        pickFirst 'lib/x86_64/libc++_shared.so'
        pickFirst 'lib/armeabi-v7a/libc++_shared.so'
        pickFirst 'lib/arm64-v8a/libc++_shared.so'
    }
}

repositories {
    google()
    mavenCentral()
    maven { url 'https://jitpack.io' }
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:2.2.20"
    implementation "com.facebook.react:react-native:+"

    // Glide
    implementation 'com.github.bumptech.glide:glide:4.16.0'
    annotationProcessor 'com.github.bumptech.glide:compiler:4.16.0'

    // PictureSelector 관련
    implementation 'io.github.liyuhaolol:PictureSelector:v3.11.8'
    implementation 'io.github.liyuhaolol:compress:v3.11.3'
    implementation 'io.github.liyuhaolol:ucrop:v3.11.7'
    implementation 'io.github.liyuhaolol:camerax:v3.11.5'

    // ExoPlayer
    implementation "com.google.android.exoplayer:exoplayer:2.19.1"

    // AndroidX
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
}
